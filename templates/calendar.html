{% extends "base.html" %}

{% block title %}日历排期 - 宝宝周岁宴道具租赁系统{% endblock %}
{% block page_title %}日历排期{% endblock %}

{% block content %}
<div class="calendar-view">
    <div class="calendar-header">
        <button class="btn btn-secondary" id="prevMonth">上月</button>
        <h3 id="currentMonth"></h3>
        <button class="btn btn-secondary" id="nextMonth">下月</button>
    </div>

    <div class="calendar-container">
        <div class="calendar-weekdays">
            <div class="weekday">日</div>
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
        </div>
        <div class="calendar-days" id="calendarDays"></div>
    </div>

    <div class="calendar-legend">
        <h4>图例</h4>
        <div class="legend-items">
            <div class="legend-item">
                <span class="legend-color" style="background: #4CAF50;"></span>
                <span>待发货</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #2196F3;"></span>
                <span>已发货</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #FF9800;"></span>
                <span>待处理</span>
            </div>
        </div>
    </div>

    <div class="events-list">
        <h4>本月活动</h4>
        <div id="eventsList"></div>
    </div>
</div>

<!-- 事件详情模态框 -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>活动详情</h3>
        <div id="eventDetails"></div>
    </div>
</div>

<script>
// 日历数据
const events = {{ events|safe }};

let currentDate = new Date();

function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    // 更新月份标题
    document.getElementById('currentMonth').textContent =
        `${year}年${month + 1}月`;

    // 获取当月第一天和最后一天
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startingDayOfWeek = firstDay.getDay();

    // 清空日历
    const calendarDays = document.getElementById('calendarDays');
    calendarDays.innerHTML = '';

    // 填充空白天数
    for (let i = 0; i < startingDayOfWeek; i++) {
        const emptyDay = document.createElement('div');
        emptyDay.className = 'calendar-day empty';
        calendarDays.appendChild(emptyDay);
    }

    // 填充日期
    for (let day = 1; day <= daysInMonth; day++) {
        const dayElement = document.createElement('div');
        dayElement.className = 'calendar-day';

        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = events.filter(e => e.start === dateStr);

        // 今天高亮
        const today = new Date();
        if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
            dayElement.classList.add('today');
        }

        dayElement.innerHTML = `
            <div class="day-number">${day}</div>
            <div class="day-events">
                ${dayEvents.map(e => `
                    <div class="event-dot" style="background: ${e.color};"
                         onclick="showEventDetails(${e.id})"
                         title="${e.title}">
                    </div>
                `).join('')}
            </div>
        `;

        calendarDays.appendChild(dayElement);
    }

    // 渲染事件列表
    renderEventsList();
}

function renderEventsList() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const monthEvents = events.filter(e => {
        const eventDate = new Date(e.start);
        return eventDate.getFullYear() === year && eventDate.getMonth() === month;
    });

    const eventsList = document.getElementById('eventsList');
    if (monthEvents.length === 0) {
        eventsList.innerHTML = '<p class="empty-state">本月暂无活动</p>';
        return;
    }

    eventsList.innerHTML = monthEvents.map(e => `
        <div class="event-item" style="border-left: 4px solid ${e.color};">
            <div class="event-date">${e.start}</div>
            <div class="event-title">${e.title}</div>
            <div class="event-status">
                <span class="badge badge-${e.status}">
                    ${e.status === 'confirmed' ? '待发货' : '已发货'}
                </span>
            </div>
            <button class="btn btn-sm" onclick="showEventDetails(${e.id})">查看</button>
        </div>
    `).join('');
}

function showEventDetails(eventId) {
    const event = events.find(e => e.id === eventId);
    if (!event) return;

    const modal = document.getElementById('eventModal');
    const details = document.getElementById('eventDetails');

    details.innerHTML = `
        <p><strong>订单号：</strong>${event.order_no}</p>
        <p><strong>预定日期：</strong>${event.start}</p>
        <p><strong>客户信息：</strong>${event.title}</p>
        <p><strong>状态：</strong>
            <span class="badge badge-${event.status}">
                ${event.status === 'confirmed' ? '待发货' : '已发货'}
            </span>
        </p>
        <div style="margin-top: 20px;">
            <a href="/orders/${event.id}/" class="btn btn-primary">查看订单详情</a>
        </div>
    `;

    modal.style.display = 'block';
}

// 上月/下月
document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
});

document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
});

// 关闭模态框
document.querySelector('.close').addEventListener('click', () => {
    document.getElementById('eventModal').style.display = 'none';
});

window.addEventListener('click', (e) => {
    const modal = document.getElementById('eventModal');
    if (e.target === modal) {
        modal.style.display = 'none';
    }
});

// 初始化
renderCalendar();
</script>
{% endblock %}

{% block extra_js %}
<script src="/static/js/calendar.js"></script>
{% endblock %}
